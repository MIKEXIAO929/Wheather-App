<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="icon" type="image/x-icon" href="img/favicon.ico">
    <link rel="apple-touch-icon" href="img/apple-touch-icon-iphone-60x60.png">
    <link rel="apple-touch-icon" sizes="76x76" href="img/apple-touch-icon-ipad-76x76.png">
    <link rel="apple-touch-icon" sizes="120x120" href="img/apple-touch-icon-iphone-retina-120x120.png">
    <link rel="apple-touch-icon" sizes="152x152" href="img/apple-touch-icon-ipad-retina-152x152.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    
</head>
<body class="min-vh-100 d-flex align-items-center" style="background-image: url('img/background.png')">
    <div class="container">
        <div class="row justify-content-center w-100">
            <div class="col-12 col-md-8 col-lg-5">
                <div class="card shadow-lg rounded-4 border-0 bg-primary text-white">
                    <div class="card-body text-center p-5">
                        <h1 id="city">Cookeville</h1>
                        <i id="weather" class="bi bi-cloud-sun fs-1"></i>
                        <p id="condition">loading please wait</p>
                        <h2 id="temp">-- °F</h2>
                        <p id="humidity">Humidity: --%</p>
                    </div>
                </div>
 
                <footer class="text-center mt-3">
                    Data Source
                <a href="https://open-meteo.com/" target="_blank" rel="noopener noreferrer">Open-Meteo</a>
                </footer>
            </div>
        </div>
    </div>

        
    

    <script>
        //base URL here
        const strweatherURL = "https://api.open-meteo.com/v1/forecast?latitude=36.1628&longitude=-85.5016&current=temperature_2m,relative_humidity_2m,weather_code&temperature_unit=fahrenheit&timezone=America%2FChicago";

        //fetch for the real data
        fetch(strweatherURL)
        .then(response => response.json())
        .then(data => {
        console.log(data);
        return data
    })
    //error handler for cases like server error and such
    .then(data => {

            //successful we insert the real data
            document.querySelector("#temp").innerHTML = `${data.current.temperature_2m} °F`;

            document.querySelector("#humidity").innerHTML = `Humidity: ${data.current.relative_humidity_2m}%`;

            //Apply bootstrap icon base on wether code
            let intWeatherCode = data.current.weather_code;

            if (intWeatherCode === 0) {

                document.querySelector("#condition").innerHTML = "sunny";

                document.querySelector("#weather").className = "bi bi-brightness-high fs-1";
            }
            else if (intWeatherCode >= 1 && intWeatherCode <= 3) {

                document.querySelector("#condition").innerHTML = "partly cloudy";

                document.querySelector("#weather").className = "bi bi-cloud-sun fs-1";
            }
            else if (intWeatherCode >= 51 && intWeatherCode <= 67) {

                document.querySelector("#condition").innerHTML = "raining";

                document.querySelector("#weather").className = "bi bi-cloud-rain fs-1";
            }
            else if (intWeatherCode >= 71 && intWeatherCode <= 77) {

                document.querySelector("#condition").innerHTML = "snowing";

                document.querySelector("#weather").className = "bi bi-cloud-snow fs-1";
            }
            else if (intWeatherCode >= 95) {

                document.querySelector("#condition").innerHTML = "storm";

                document.querySelector("#weather").className = "bi bi-cloud-lightning-rain fs-1";
            }
            else {

                document.querySelector("#condition").innerHTML = "weather unavailable";

                document.querySelector("#weather").className = "bi bi-cloud fs-1";
            }
        }
    )
    //error handing for cases such as no internet or request crashed
    .catch(() => {
        document.querySelector("#condition").innerHTML = "there was an error loading data.";

        document.querySelector("#temp").innerHTML = "-- °F";

        document.querySelector("#humidity").innerHTML = "Humidity: --%";
    });
    </script>
</body>

</html>
